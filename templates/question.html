{% load static %}
<div class="cards">

    <article class="card">
        <div class="user-post">
            <img src="{% static 'img/profile.png' %}" alt="profile" class="card-image">
            <input type="number" class="card-likes" value="10">
        </div>

        <div class="post-content">
            <div class="post-content-preview">
                <h3 class="card-title"><a href="/question.html">{{questions.title}}</a></h3>
                <div class="card-text">{{questions.text}}</div>
            </div>

            <div class="post-content-bottom">
                <a href="./answers.html" >Answer(23)</a>
                <div class="tags">
                    <a href="#">Link</a>
                    <a href="#">Link</a>
                    <a href="#">Link</a>
                </div>
            </div>
        </div>
    </article>
</div>
