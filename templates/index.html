{% extends 'layouts/base.html' %}
{% load static %}


{% block content %}
            <div class="cards">
                {% for question in questions %}
                     <article class="card">
                        <div class="user-post">
                            <img src="{% static 'img/profile.png' %}" alt="profile" class="card-image">
                            <input type="number" class="card-likes" value="10">
                        </div>

                        <div class="post-content">
                            <div class="post-content-preview">
                                <h3 class="card-title">
                                    <a href="/question.html">
                                        {{ question.title }}
                                    </a>
                                </h3>
                                <div class="card-text">
                                    {{ question.text}}
                                </div>
                            </div>
                            <div class="post-content-bottom">
                                <a href="./answers.html" >Answer(23)</a>
                                <div class="tags">
                                    <a href="#">Link</a>
                                    <a href="#">Link</a>
                                    <a href="#">Link</a>
                                </div>
                            </div>
                        </div>
                    </article>
                {% endfor %}


                <div class="pagination">
                    <button>1</button>
                    <button>2</button>
                    <button>...</button>
                    <button>100</button>

                </div>
            </div>
{% endblock %}
